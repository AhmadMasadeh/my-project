<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; color: #eee; }
  .container { text-align: center; }
  h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  #status { font-size: 1.2rem; margin-bottom: 1rem; min-height: 1.8rem; }
  .board { display: grid; grid-template-columns: repeat(3, 120px); grid-template-rows: repeat(3, 120px); gap: 6px; margin: 0 auto 1.5rem; }
  .cell { background: #16213e; border: none; border-radius: 8px; font-size: 3rem; font-weight: bold; color: #eee; cursor: pointer; transition: background 0.15s; }
  .cell:hover { background: #1a3a5c; }
  .cell.x { color: #e94560; }
  .cell.o { color: #0f3460; }
  .cell.win { background: #e94560; color: #fff; }
  button.restart { padding: 0.6rem 2rem; font-size: 1rem; border: none; border-radius: 6px; background: #e94560; color: #fff; cursor: pointer; }
  button.restart:hover { background: #c73650; }
  .mode { margin-bottom: 1rem; }
  .mode button { padding: 0.4rem 1rem; margin: 0 0.3rem; border: 2px solid #e94560; border-radius: 6px; background: transparent; color: #eee; cursor: pointer; font-size: 0.9rem; }
  .mode button.active { background: #e94560; color: #fff; }
</style>
</head>
<body>
<div class="container">
  <h1>Tic Tac Toe</h1>
  <div class="mode">
    <button id="pvp" class="active" onclick="setMode('pvp')">2 Players</button>
    <button id="pvc" onclick="setMode('pvc')">vs Computer</button>
  </div>
  <div id="status">X's turn</div>
  <div class="board" id="board"></div>
  <button class="restart" onclick="restart()">Restart</button>
</div>
<script>
const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,2,4,6],[2,4,6]];
const LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let board, turn, over, mode = 'pvp';

function setMode(m) {
  mode = m;
  document.getElementById('pvp').className = m === 'pvp' ? 'active' : '';
  document.getElementById('pvc').className = m === 'pvc' ? 'active' : '';
  restart();
}

function restart() {
  board = Array(9).fill('');
  turn = 'X';
  over = false;
  document.getElementById('status').textContent = "X's turn";
  render();
}

function render() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  board.forEach((v, i) => {
    const btn = document.createElement('button');
    btn.className = 'cell' + (v === 'X' ? ' x' : v === 'O' ? ' o' : '');
    btn.textContent = v;
    btn.onclick = () => play(i);
    btn.id = 'c' + i;
    el.appendChild(btn);
  });
}

function check() {
  for (const line of LINES) {
    const [a, b, c] = line;
    if (board[a] && board[a] === board[b] && board[a] === board[c]) return { winner: board[a], line };
  }
  return board.includes('') ? null : { winner: 'draw', line: [] };
}

function play(i) {
  if (over || board[i]) return;
  board[i] = turn;
  const result = check();
  if (result) return finish(result);
  turn = turn === 'X' ? 'O' : 'X';
  document.getElementById('status').textContent = turn + "'s turn";
  render();
  if (mode === 'pvc' && turn === 'O' && !over) setTimeout(aiMove, 200);
}

function finish(result) {
  over = true;
  render();
  if (result.winner === 'draw') {
    document.getElementById('status').textContent = "It's a draw!";
  } else {
    document.getElementById('status').textContent = result.winner + ' wins!';
    result.line.forEach(i => document.getElementById('c' + i).classList.add('win'));
  }
}

function aiMove() {
  // Try to win, then block, then center, then corners, then edges
  const move = findBest('O') ?? findBest('X') ?? tryCell(4) ?? tryAny([0,2,6,8]) ?? tryAny([1,3,5,7]);
  if (move !== null) play(move);
}

function findBest(p) {
  for (const [a, b, c] of LINES) {
    const cells = [a, b, c];
    const vals = cells.map(i => board[i]);
    if (vals.filter(v => v === p).length === 2 && vals.includes('')) return cells[vals.indexOf('')];
  }
  return null;
}

function tryCell(i) { return board[i] === '' ? i : null; }
function tryAny(cells) { const open = cells.filter(i => !board[i]); return open.length ? open[Math.floor(Math.random() * open.length)] : null; }

restart();
</script>
</body>
</html>
